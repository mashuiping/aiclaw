# AIClaw Configuration Example
#
# Copy this file to ~/.aiclaw/config.toml and customize it.
#
# Cluster access for `[skills].exec`: set environment variable AICLAW_KUBECONFIG to an absolute
# path to a kubeconfig file when starting the binary (not configured in this file).

[agent]
name = "aiclaw"
session_timeout_secs = 3600
concurrent_limit = 100
# Optional logical cluster key (must match a `[clusters.<name>]` key) when using `[skills].exec.prepend_kubectl_context` and the message does not name a cluster.
# default_cluster = "prod"
compact_prompt = false

# Feishu (飞书) Configuration
[channels.feishu]
type = "Feishu"
enabled = true
# Mode: "long_poll" (receive via long polling), "webhook" (receive via webhook), or "both" (default)
mode = "long_poll"
bot_name = "AIOps Bot"
# Long polling (recommended for tunnel/dev deployments)
# Requires: app_id and app_secret from Feishu Open Platform
app_id = "cli_xxxxxxxxxxxxxxxx"
app_secret = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
# Required for long_poll: Feishu `container_id` for GET im/v1/messages (with long_poll_container_id_type, default p2p).
# For p2p, use the user's open_id in the bot single chat, or the id type your deployment uses per Feishu docs.
# long_poll_container_id = "oc_xxxxxxxxxxxxxxxxxxxxxxxxxxxx"  # 会话 chat_id（单聊/群聊），见开放平台「群 ID 说明」
# long_poll_container_id_type = "chat" # 官方取值：chat | thread（默认 chat，含机器人单聊 p2p）
polling_timeout_secs = 30
# Webhook mode: URL for receiving events from Feishu (also requires webhook_listen_addr)
# webhook_url = "https://open.feishu.cn/open-apis/bot/v2/hook/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
# webhook_listen_addr = "0.0.0.0:8089"

# WeCom (企业微信) Configuration
[channels.wecom]
type = "WeCom"
enabled = false
corp_id = "wwxxxxxxxxxxxxxx"
agent_id = "1000001"
# webhook_url = "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# Local channel: stdin/stdout (mode = "stdio") or WebSocket gateway (mode = "http") on bind:port.
# Use one mode per process; stdio reads one line per user message; assistant replies are prefixed with [aiclaw].
[channels.local]
type = "Local"
enabled = false
mode = "stdio" # stdio | http
bind = "127.0.0.1"
port = 18789

# Skills Configuration
[skills]
skills_dir = "~/.aiclaw/skills"
open_skills_enabled = false
allowed_scripts = false

# LLM + shell loop for Markdown skills (OpenClaw-style `tools.exec` subset).
# When enabled, requires a working [llm] default provider and safe network/RBAC on the host running aiclaw.
[skills.exec]
enabled = false
security = "allowlist" # deny | allowlist | full
max_steps = 10
timeout_secs = 120
prepend_kubectl_context = false
allow_helm = false

# VictoriaMetrics connection — injected as $VM_METRICS_URL, $VM_LOGS_URL, $VM_AUTH_HEADER, $VM_AK, $VM_SK
# when LLM-driven skills execute curl commands or Python scripts.
[skills.exec.victoriametrics]
# Base URL for VictoriaMetrics /select/X/prometheus endpoint (cluster) or http://host:8428 (single-node).
vm_metrics_url = "http://localhost:8428"
# Base URL for VictoriaLogs /select/logsql endpoint.
vm_logs_url = "http://localhost:8428"
# Optional auth header, e.g. "Bearer <token>". Leave empty for no auth (used by curl-based tools).
vm_auth_header = ""
# Access Key for aiops platform AK/SK auth (used by Python script tools).
# vm_ak = ""
# Secret Key for aiops platform AK/SK auth (used by Python script tools).
# vm_sk = ""

# Logical cluster registry: maps intent / default_cluster names to kubectl --context (host kubectl only).
# If `context` is omitted, the TOML table key (e.g. prod) is used as the kubectl context name.
# Legacy top-level table name `[kubernetes.<name>]` is still accepted as an alias for `[clusters.<name>]`.
[clusters.prod]
enabled = true
# context = "my-eks-prod"

[clusters.dev]
enabled = false

# AI/OPS Providers
[aiops.victoria]
enabled = true
provider_type = "victoria"
# vmselect (query) endpoint — used by built-in VictoriaMetricsProvider (currently not wired to skills).
endpoint = "http://victoriametrics:8428"
timeout_secs = 30
retry_attempts = 3

[aiops.prometheus]
enabled = false
provider_type = "prometheus"
endpoint = "http://prometheus:9090"
timeout_secs = 30
retry_attempts = 3

# Observability
[observability]
observability_type = "Log"  # Log, Prometheus, OpenTelemetry
otel_endpoint = "http://localhost:4317"  # OpenTelemetry collector endpoint
metrics_port = 9090
tracing_level = "Info"  # Debug, Info, Warn, Error

# Security
[security]
dangerous_commands = ["rm", "dd", "mkfs"]
sensitive_path_suffixes = [".kubeconfig", ".docker/config.json", ".aws/credentials"]

# Logging
[logging]
level = "info"
format = "Json"  # Json, Plain
output = "Stdout"  # Stdout, File

# ============================================================================
# LLM Configuration (AI Intent Classification & Summarization)
# ============================================================================

[llm]
enabled = true
default_provider = "anthropic"  # Default provider: anthropic, openai, deepseek, zhipu, minimax, qwen

# Routing mode: direct | openrouter | ollama
# - direct: Call providers directly (default)
# - openrouter: Route through OpenRouter gateway (supports multiple providers)
# - ollama: Use local Ollama server
[llm.routing]
mode = "direct"

# OpenRouter configuration (when mode = "openrouter")
[llm.routing.openrouter]
enabled = false
base_url = "https://openrouter.ai/api"
api_key = "${OPENROUTER_API_KEY}"

# Ollama configuration (when mode = "ollama")
[llm.routing.ollama]
enabled = false
base_url = "http://localhost:11434"
model = "llama3"
timeout_secs = 120

# Provider: Anthropic (Claude)
[llm.providers.anthropic]
enabled = true
provider_type = "anthropic"
api_key = "${ANTHROPIC_API_KEY}"
# base_url = "https://api.anthropic.com"  # Optional: defaults to Anthropic API
model = "claude-3-5-sonnet-20241022"
max_tokens = 1024
timeout_secs = 60

# Provider: OpenAI
[llm.providers.openai]
enabled = false
provider_type = "openai"
api_key = "${OPENAI_API_KEY}"
# base_url = "https://api.openai.com/v1"  # Optional: defaults to OpenAI API
model = "gpt-4o"
max_tokens = 1024
timeout_secs = 60

# Provider: DeepSeek
[llm.providers.deepseek]
enabled = false
provider_type = "deepseek"
api_key = "${DEEPSEEK_API_KEY}"
base_url = "https://api.deepseek.com"
model = "deepseek-chat"
max_tokens = 1024
timeout_secs = 60

# Provider: Zhipu AI (智谱)
[llm.providers.zhipu]
enabled = false
provider_type = "zhipu"
api_key = "${ZHIPU_API_KEY}"
base_url = "https://open.bigmodel.cn"
model = "glm-4"
max_tokens = 1024
timeout_secs = 60

# Provider: MiniMax
[llm.providers.minimax]
enabled = false
provider_type = "minimax"
api_key = "${MINIMAX_API_KEY}"
base_url = "https://api.minimax.chat"
model = "abab6.5s-chat"
max_tokens = 1024
timeout_secs = 60

# Provider: Qwen (通义千问)
[llm.providers.qwen]
enabled = false
provider_type = "qwen"
api_key = "${DASHSCOPE_API_KEY}"
base_url = "https://dashscope.aliyuncs.com"
model = "qwen-turbo"
max_tokens = 1024
timeout_secs = 60
