# AIClaw Configuration Example
#
# Copy this file to ~/.aiclaw/config.toml and customize it.

[agent]
name = "aiclaw"
session_timeout_secs = 3600
concurrent_limit = 100
default_cluster = "prod"
compact_prompt = false

# Feishu (飞书) Configuration
[channels.feishu]
type = "Feishu"
enabled = true
bot_name = "AIOps Bot"
# Webhook URL for receiving messages (set one of webhook_url or long_polling)
webhook_url = "https://open.feishu.cn/open-apis/bot/v2/hook/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
# Long polling configuration
# app_id = "cli_xxxxxxxxxxxxxxxx"
# app_secret = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
# long_polling_timeout_secs = 30

# WeCom (企业微信) Configuration
[channels.wecom]
type = "WeCom"
enabled = false
corp_id = "wwxxxxxxxxxxxxxx"
agent_id = "1000001"
# webhook_url = "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# Skills Configuration
[skills]
skills_dir = "~/.aiclaw/skills"
open_skills_enabled = false
allowed_scripts = false

# MCP Server Configuration (VictoriaMetrics, etc.)
[mcp.servers.victoriametrics]
enabled = true
command = "npx"
args = ["-y", "@modelcontextprotocol/server-victoriametrics"]

[mcp.transport]
transport_type = "Stdio"

# AI/OPS Providers
[aiops.victoria]
enabled = true
provider_type = "victoria"
endpoint = "http://victoriametrics:8428"
timeout_secs = 30
retry_attempts = 3

[aiops.prometheus]
enabled = false
provider_type = "prometheus"
endpoint = "http://prometheus:9090"
timeout_secs = 30
retry_attempts = 3

# Kubernetes Clusters
[kubernetes.prod]
enabled = true
context = "prod"
kubeconfig_path = "~/.kube/config"
default_namespace = "default"
timeout_secs = 10

[kubernetes.dev]
enabled = false
context = "dev"
kubeconfig_path = "~/.kube/config-dev"
default_namespace = "dev"
timeout_secs = 10

# Observability
[observability]
observability_type = "Log"  # Log, Prometheus, OpenTelemetry
otel_endpoint = "http://localhost:4317"  # OpenTelemetry collector endpoint
metrics_port = 9090
tracing_level = "Info"  # Debug, Info, Warn, Error

# Security
[security]
dangerous_commands = ["rm", "dd", "mkfs"]
sensitive_path_suffixes = [".kubeconfig", ".docker/config.json", ".aws/credentials"]

# Logging
[logging]
level = "info"
format = "Json"  # Json, Plain
output = "Stdout"  # Stdout, File

# ============================================================================
# LLM Configuration (AI Intent Classification & Summarization)
# ============================================================================

[llm]
enabled = true
default_provider = "anthropic"  # Default provider: anthropic, openai, deepseek, zhipu, minimax, qwen

# Routing mode: direct | openrouter | ollama
# - direct: Call providers directly (default)
# - openrouter: Route through OpenRouter gateway (supports multiple providers)
# - ollama: Use local Ollama server
[llm.routing]
mode = "direct"

# OpenRouter configuration (when mode = "openrouter")
[llm.routing.openrouter]
enabled = false
base_url = "https://openrouter.ai/api"
api_key = "${OPENROUTER_API_KEY}"

# Ollama configuration (when mode = "ollama")
[llm.routing.ollama]
enabled = false
base_url = "http://localhost:11434"
model = "llama3"
timeout_secs = 120

# Provider: Anthropic (Claude)
[llm.providers.anthropic]
enabled = true
provider_type = "anthropic"
api_key = "${ANTHROPIC_API_KEY}"
model = "claude-3-5-sonnet-20241022"
max_tokens = 1024
timeout_secs = 60

# Provider: OpenAI
[llm.providers.openai]
enabled = false
provider_type = "openai"
api_key = "${OPENAI_API_KEY}"
model = "gpt-4o"
max_tokens = 1024
timeout_secs = 60

# Provider: DeepSeek
[llm.providers.deepseek]
enabled = false
provider_type = "deepseek"
api_key = "${DEEPSEEK_API_KEY}"
base_url = "https://api.deepseek.com"
model = "deepseek-chat"
max_tokens = 1024
timeout_secs = 60

# Provider: Zhipu AI (智谱)
[llm.providers.zhipu]
enabled = false
provider_type = "zhipu"
api_key = "${ZHIPU_API_KEY}"
base_url = "https://open.bigmodel.cn"
model = "glm-4"
max_tokens = 1024
timeout_secs = 60

# Provider: MiniMax
[llm.providers.minimax]
enabled = false
provider_type = "minimax"
api_key = "${MINIMAX_API_KEY}"
base_url = "https://api.minimax.chat"
model = "abab6.5s-chat"
max_tokens = 1024
timeout_secs = 60

# Provider: Qwen (通义千问)
[llm.providers.qwen]
enabled = false
provider_type = "qwen"
api_key = "${DASHSCOPE_API_KEY}"
base_url = "https://dashscope.aliyuncs.com"
model = "qwen-turbo"
max_tokens = 1024
timeout_secs = 60
